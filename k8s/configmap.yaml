# upload service — COS/OSS 文件上传
# APP_ENV 环境变量: COS (腾讯云) | OSS (阿里云)
# 部署: kubectl apply -f .
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: upload-config
data:
  application-prod.yml: |
    name: "upload"
    mode: "prod"
    port: 80
    host: "0.0.0.0"
    cos:
      secret_id: ""
      secret_key: ""
      region: "ap-guangzhou"
      bucket_url: "https://examplebucket-1250000000.cos.ap-guangzhou.myqcloud.com"
    oss:
      access_key_id: ""
      access_key_secret: ""
      endpoint: "https://oss-cn-hangzhou.aliyuncs.com"
      bucket: "examplebucket"
